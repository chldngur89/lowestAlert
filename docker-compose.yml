version: '3.8'

services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: lowestalert-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes  # 영구 저장 활성화
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend API Server
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lowestalert-api
    environment:
      - NODE_ENV=development
      - PORT=3001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CRAWLER_MODE=local-browser
      - RESIDENTIAL_PROXY_ENABLED=false
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev

  # Frontend (개발용)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: lowestalert-web
    environment:
      - VITE_API_BASE_URL=http://localhost:3001
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  redis_data:
